<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relay Module - TraceCore Labs</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* FULL SCREEN VIDEO HERO */
        .video-hero {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* VIDEO */
        .bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: -1;
        }

        /* DARK OVERLAY */
        .video-hero::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 28, 0.65);
            top: 0;
            left: 0;
        }

        /* CONTENT */
        .overlay-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            text-align: center;
            color: white;
        }

        .overlay-content h1 {
            font-size: 3rem;
            color: #ff7b00;
            text-shadow: 0 0 20px rgba(255,123,0,0.8);
        }

        .overlay-content p {
            margin: 20px 0;
            font-size: 1.2rem;
        }

        .overlay-content button {
            padding: 12px 25px;
            background: linear-gradient(45deg, #ff7b00, #ff4500);
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .overlay-content button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #ff7b00;
        }

        /* DETAILS SECTION */
        .details {
            padding: 80px 20px;
            text-align: center;
        }

        .details h2 {
            color: #00d4ff;
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #0d1324;
        }
    </style>

</head>
<body>

<!-- NAVBAR -->
<header>
    <div class="logo">
        <img src="logo.png">
        <span>TraceCore Labs</span>
    </div>
</header>

<!-- 🔥 FULL SCREEN VIDEO HERO -->
<section class="video-hero">

    <video autoplay muted loop playsinline class="bg-video">
        <source src="relay.mp4" type="video/mp4">
    </video>

    <div class="overlay-content">
        <h1>4-Channel Relay Control PCB</h1>
        <p>High-performance relay module for automation, robotics, and IoT systems.</p>
        <button onclick="scrollToDetails()">Explore More</button>
    </div>

</section>

<!-- DETAILS -->
<section class="details">
    <h2>Product Features</h2>
    <p>
        ✔ 4 Channel Relay Output <br>
        ✔ High Voltage Switching <br>
        ✔ ESP32 / Arduino Compatible <br>
        ✔ Industrial Grade PCB Design
    </p>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 TraceCore Labs. All Rights Reserved.</p>
</footer>

<!-- SCRIPT -->
<script>
function scrollToDetails() {
    window.scrollTo({
        top: window.innerHeight,
        behavior: "smooth"
    });
}
</script>

</body>
</html>
