<!DOCTYPE html>
<html>

</head>

    <div class="logo">
        <img src="logo.png">
        <span>TraceCore Labs</span>
    </div>
</header>

<section class="video-hero">

    <video autoplay muted loop playsinline class="bg-video">
        <source src="relay.mp4" type="video/mp4">
    </video>

    <div class="hero-center">
        <a href="#order" class="hero-title">
            4-Channel Relay PCB

    <div class="order-container">

        <div class="order-card">
            <h3>Standard</h3>

        </div>

        <div class="order-card">
            <h3>Custom</h3>

    </div>

</section>

<footer>
    <p>© 2026 TraceCore Labs</p>
</footer>
